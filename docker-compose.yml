services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: docintel_pg
    restart: unless-stopped
    environment:
      POSTGRES_USER: docintel
      POSTGRES_PASSWORD: docintel
      POSTGRES_DB: docintel
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - docintel_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U docintel -d docintel"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  docintel_pg_data:
