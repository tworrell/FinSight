services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: equi_docintel_pg
    restart: unless-stopped
    environment:
      POSTGRES_USER: equi
      POSTGRES_PASSWORD: equi
      POSTGRES_DB: equi_docintel
    ports:
      - "5433:5432"
    volumes:
      - equi_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U equi -d equi_docintel"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  equi_pg_data:
